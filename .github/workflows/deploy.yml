name: Deploy to OCI

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          retention-days: 3
          path: public/build/

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: public/build/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.OCI_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via rsync
        env:
          REMOTE_HOST: ${{ secrets.OCI_HOST }}
          REMOTE_USER: ${{ secrets.OCI_USER }}
          DEPLOY_BASE: /var/www/php/saju_learning
        run: |
          set -euo pipefail

          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          REMOTE="${REMOTE_USER}@${REMOTE_HOST}"
          RELEASE_TS=$(date +%Y%m%d%H%M%S)
          RELEASE_DIR="${DEPLOY_BASE}/releases/${RELEASE_TS}"

          $SSH_CMD "$REMOTE" "mkdir -p \
            '${RELEASE_DIR}' \
            '${DEPLOY_BASE}/shared/storage/app/public' \
            '${DEPLOY_BASE}/shared/storage/framework/cache' \
            '${DEPLOY_BASE}/shared/storage/framework/sessions' \
            '${DEPLOY_BASE}/shared/storage/framework/views' \
            '${DEPLOY_BASE}/shared/storage/logs' \
            '${DEPLOY_BASE}/shared/database'"

          rsync -azP --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='storage' \
            --exclude='node_modules' \
            --exclude='.github' \
            -e "${SSH_CMD}" \
            ./ "${REMOTE}:${RELEASE_DIR}/"

          $SSH_CMD "$REMOTE" bash -s -- "${RELEASE_DIR}" "${DEPLOY_BASE}" <<'DEPLOY_SCRIPT'
          set -euo pipefail

          RELEASE_DIR="$1"
          DEPLOY_BASE="$2"
          DEPLOY_USER="$(id -un)"
          WEB_USER="apache"

          cp "${RELEASE_DIR}/.env.prod" "${DEPLOY_BASE}/shared/.env"
          ln -sfn "${DEPLOY_BASE}/shared/.env" "${RELEASE_DIR}/.env"
          rm -rf "${RELEASE_DIR}/storage"
          ln -sfn "${DEPLOY_BASE}/shared/storage" "${RELEASE_DIR}/storage"

          cd "${RELEASE_DIR}"
          composer install --no-dev --optimize-autoloader --no-interaction --no-progress

          sudo chown -R "${DEPLOY_USER}:${WEB_USER}" \
            "${DEPLOY_BASE}/shared/storage" \
            "${DEPLOY_BASE}/shared/database" \
            "${RELEASE_DIR}/bootstrap/cache"
          sudo chmod -R ug+rwX \
            "${DEPLOY_BASE}/shared/storage" \
            "${DEPLOY_BASE}/shared/database" \
            "${RELEASE_DIR}/bootstrap/cache"
          sudo setfacl -R -m "u:${DEPLOY_USER}:rwx,u:${WEB_USER}:rwx" \
            "${DEPLOY_BASE}/shared/storage" \
            "${DEPLOY_BASE}/shared/database" \
            "${RELEASE_DIR}/bootstrap/cache"
          sudo setfacl -R -d -m "u:${DEPLOY_USER}:rwx,u:${WEB_USER}:rwx" \
            "${DEPLOY_BASE}/shared/storage" \
            "${DEPLOY_BASE}/shared/database" \
            "${RELEASE_DIR}/bootstrap/cache"
          sudo chcon -R -t httpd_sys_rw_content_t \
            "${DEPLOY_BASE}/shared/storage" \
            "${DEPLOY_BASE}/shared/database" \
            "${RELEASE_DIR}/bootstrap/cache" || true

          php artisan config:clear
          php artisan cache:clear
          php artisan route:clear
          php artisan view:clear
          php artisan migrate --force
          php artisan db:seed --force
          php artisan storage:link || true

          ln -sfn "${RELEASE_DIR}" "${DEPLOY_BASE}/current"

          sudo systemctl reload php-fpm
          sudo systemctl reload nginx

          cd "${DEPLOY_BASE}/releases"
          ls -1dt */ | tail -n +4 | xargs -r rm -rf

          echo "Deployed: ${RELEASE_DIR}"
          DEPLOY_SCRIPT

      - name: Verify deployment
        env:
          REMOTE_HOST: ${{ secrets.OCI_HOST }}
          REMOTE_USER: ${{ secrets.OCI_USER }}
        run: |
          set -euo pipefail
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          $SSH_CMD "${REMOTE_USER}@${REMOTE_HOST}" "cd /var/www/php/saju_learning/current && php artisan --version"

      - name: Rollback on failure
        if: failure()
        env:
          REMOTE_HOST: ${{ secrets.OCI_HOST }}
          REMOTE_USER: ${{ secrets.OCI_USER }}
        run: |
          set -euo pipefail
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          $SSH_CMD "${REMOTE_USER}@${REMOTE_HOST}" bash <<'EOF'
          set -euo pipefail
          PREV=$(ls -1dt /var/www/php/saju_learning/releases/*/ | sed -n '2p' | sed 's:/$::')
          if [ -n "$PREV" ]; then
            ln -sfn "$PREV" /var/www/php/saju_learning/current
            sudo systemctl reload php-fpm
            sudo systemctl reload nginx
            echo "Rolled back to: $PREV"
          fi
          EOF
