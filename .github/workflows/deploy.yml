name: Deploy to EC2

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          retention-days: 3
          path: public/build/

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: public/build/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via rsync
        env:
          REMOTE_HOST: ${{ secrets.EC2_HOST }}
          REMOTE_USER: ${{ secrets.EC2_USER }}
          DEPLOY_BASE: /var/www/php/saju_learning
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          REMOTE="${REMOTE_USER}@${REMOTE_HOST}"
          RELEASE_TS=$(date +%Y%m%d%H%M%S)
          RELEASE_DIR="${DEPLOY_BASE}/releases/${RELEASE_TS}"

          # Create release directory and shared directories
          $SSH_CMD $REMOTE "mkdir -p ${RELEASE_DIR} ${DEPLOY_BASE}/shared/storage/{app/public,framework/{cache,sessions,views},logs} ${DEPLOY_BASE}/shared/database"

          # Sync files to release directory
          rsync -azP --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='storage' \
            --exclude='node_modules' \
            --exclude='.github' \
            -e "${SSH_CMD}" \
            ./ ${REMOTE}:${RELEASE_DIR}/

          # Run deployment commands on server
          $SSH_CMD $REMOTE bash -s "${RELEASE_DIR}" "${DEPLOY_BASE}" << 'DEPLOY_SCRIPT'
          set -e
          RELEASE_DIR="$1"
          DEPLOY_BASE="$2"

          # .env.prod -> shared/.env 자동 동기화
          cp "${RELEASE_DIR}/.env.prod" "${DEPLOY_BASE}/shared/.env"

          # shared 심볼릭 링크
          ln -sfn "${DEPLOY_BASE}/shared/.env" "${RELEASE_DIR}/.env"
          rm -rf "${RELEASE_DIR}/storage"
          ln -sfn "${DEPLOY_BASE}/shared/storage" "${RELEASE_DIR}/storage"

          # composer install (서버에서)
          cd "${RELEASE_DIR}"
          composer install --no-dev --optimize-autoloader --no-interaction --no-progress

          # Laravel 캐시 클리어 + migrate
          php artisan config:clear
          php artisan cache:clear
          php artisan route:clear
          php artisan view:clear
          php artisan migrate --force
          php artisan storage:link || true

          # current 심볼릭 링크 전환
          ln -sfn "${RELEASE_DIR}" "${DEPLOY_BASE}/current"

          # 권한/SELinux
          setfacl -R -m u:apache:rwx "${DEPLOY_BASE}/shared/storage" "${DEPLOY_BASE}/current/bootstrap/cache"
          chcon -R -t httpd_sys_rw_content_t "${DEPLOY_BASE}/shared/storage" "${DEPLOY_BASE}/current/bootstrap/cache"

          # 이전 릴리스 정리 (최근 3개 보존)
          cd "${DEPLOY_BASE}/releases"
          ls -1dt */ | tail -n +4 | xargs rm -rf 2>/dev/null || true

          echo "Deployed: ${RELEASE_DIR}"
          DEPLOY_SCRIPT

      - name: Verify deployment
        env:
          REMOTE_HOST: ${{ secrets.EC2_HOST }}
          REMOTE_USER: ${{ secrets.EC2_USER }}
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          $SSH_CMD ${REMOTE_USER}@${REMOTE_HOST} "cd /var/www/php/saju_learning/current && php artisan --version"

      - name: Rollback on failure
        if: failure()
        env:
          REMOTE_HOST: ${{ secrets.EC2_HOST }}
          REMOTE_USER: ${{ secrets.EC2_USER }}
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          $SSH_CMD ${REMOTE_USER}@${REMOTE_HOST} bash << 'EOF'
          PREV=$(ls -1dt /var/www/php/saju_learning/releases/*/ | sed -n '2p' | tr -d '/')
          if [ -n "$PREV" ]; then
            ln -sfn "$PREV" /var/www/php/saju_learning/current
            setfacl -R -m u:apache:rwx /var/www/php/saju_learning/shared/storage /var/www/php/saju_learning/current/bootstrap/cache
            chcon -R -t httpd_sys_rw_content_t /var/www/php/saju_learning/shared/storage /var/www/php/saju_learning/current/bootstrap/cache
            echo "Rolled back to: $PREV"
          fi
          EOF
